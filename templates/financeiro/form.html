{% extends "base.html" %}
{% block content %}
  <h3>Novo lançamento</h3>
  <form method="post" class="mt-3">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-3"><label class="form-label">Tipo</label>{{ form.tipo }}</div>
      <div class="col-md-3"><label class="form-label">Origem</label>{{ form.origem }}</div>
      <div class="col-md-3"><label class="form-label">Data</label>{{ form.data }}</div>
      <div class="col-md-3"><label class="form-label">Valor</label>{{ form.valor }}</div>
      <div class="col-md-4"><label class="form-label">Categoria</label>{{ form.categoria }}</div>
      <div class="col-md-8"><label class="form-label">Descrição</label>{{ form.descricao }}</div>
    </div>
    <div class="mt-3">
      <button class="btn btn-primary">Salvar</button>
      <a class="btn btn-outline-secondary" href="/financeiro/">Voltar</a>
    </div>
  </form>
  <script>document.querySelectorAll("input, textarea, select").forEach(el => el.classList.add("form-control"));</script>
{% endblock %}
