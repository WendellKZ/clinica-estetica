{% extends "base.html" %}
{% block content %}
  <h3>{{ titulo }}</h3>
  <form method="post" class="mt-3">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Nome</label>{{ form.nome }}</div>
      <div class="col-md-3"><label class="form-label">SKU</label>{{ form.sku }}</div>
      <div class="col-md-3"><label class="form-label">Estoque</label>{{ form.estoque_atual }}</div>
      <div class="col-md-3"><label class="form-label">Custo</label>{{ form.custo }}</div>
      <div class="col-md-3"><label class="form-label">Preço venda</label>{{ form.preco_venda }}</div>
      <div class="col-md-3"><label class="form-label">Ativo</label>{{ form.ativo }}</div>
    </div>
    <div class="mt-3">
      <button class="btn btn-primary">Salvar</button>
      <a class="btn btn-outline-secondary" href="/loja/produtos/">Voltar</a>
    </div>
  </form>
  <script>document.querySelectorAll("input, textarea, select").forEach(el => el.classList.add("form-control"));</script>
{% endblock %}
