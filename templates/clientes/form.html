{% extends "base.html" %}
{% block content %}
  <h3>{{ titulo }}</h3>
  <form method="post" class="mt-3">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Nome</label>
        {{ form.nome }}
      </div>
      <div class="col-md-3">
        <label class="form-label">Telefone</label>
        {{ form.telefone }}
      </div>
      <div class="col-md-3">
        <label class="form-label">Email</label>
        {{ form.email }}
      </div>
      <div class="col-12">
        <label class="form-label">Observações</label>
        {{ form.observacoes }}
      </div>
    </div>
    <div class="mt-3">
      <button class="btn btn-primary">Salvar</button>
      <a class="btn btn-outline-secondary" href="/clientes/">Voltar</a>
    </div>
  </form>

  <script>
    // Bootstrap classes for django widgets
    document.querySelectorAll("input, textarea, select").forEach(el => el.classList.add("form-control"));
  </script>
{% endblock %}
