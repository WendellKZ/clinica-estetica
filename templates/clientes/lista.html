{% extends "base.html" %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center">
    <h3>Clientes</h3>
    <a class="btn btn-primary" href="/clientes/novo/">Novo</a>
  </div>

  <form class="row g-2 mt-2" method="get">
    <div class="col-md-6">
      <input class="form-control" name="q" placeholder="Buscar por nome..." value="{{ q }}">
    </div>
    <div class="col-md-2">
      <button class="btn btn-outline-secondary w-100">Buscar</button>
    </div>
  </form>

  <div class="table-responsive mt-3">
    <table class="table table-sm table-striped">
      <thead><tr><th>Nome</th><th>Telefone</th><th>Email</th><th></th></tr></thead>
      <tbody>
        {% for c in clientes %}
          <tr>
            <td>{{ c.nome }}</td><td>{{ c.telefone }}</td><td>{{ c.email }}</td>
            <td class="text-end"><a class="btn btn-sm btn-outline-secondary" href="/clientes/{{ c.id }}/editar/">Editar</a></td>
          </tr>
        {% empty %}
          <tr><td colspan="4" class="text-muted">Nenhum cliente.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
