{% extends "base.html" %}
{% load static %}
{% block content %}
  <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-7 col-lg-5">
      <div class="text-center mb-3">
        <img src="{% static 'img/logo-elisangela.png' %}" alt="Logo" style="width: 240px; max-width: 92%; object-fit: contain;">
      </div>

      <div class="card glass login-hero">
        <div class="card-body p-4 p-md-5">
          <h4 class="mb-1 text-center" style="color:#6b2b7a; font-weight:800;">Bem-vindo(a)</h4>
          <p class="text-muted text-center mb-4">Acesse para gerenciar agenda, vendas e financeiro.</p>

          {% if error %}
            <div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>{{ error }}</div>
          {% endif %}

          <form method="post" class="mt-2">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Usuário</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input class="form-control" name="username" autocomplete="username" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Senha</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input class="form-control" type="password" name="password" autocomplete="current-password" required>
              </div>
            </div>

            <button class="btn btn-primary w-100 py-2"><i class="bi bi-heart-fill me-2"></i>Entrar</button>
          </form>

          <div class="text-center mt-3">
            <span class="small text-muted">Elisângela Barbosa Estética</span>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
