services:
  - type: web
    name: estetica-clinica
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn estetica.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /login/
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: "estetica-clinica.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://estetica-clinica.onrender.com"
      - key: SECURE_PROXY_SSL_HEADER
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: estetica-clinica-db
          property: connectionString

databases:
  - name: estetica-clinica-db
    plan: free
